<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d27a"/>
      <stop offset="0.55" stop-color="#e8b04a"/>
      <stop offset="1" stop-color="#c8722f"/>
    </linearGradient>
    <radialGradient id="pool" cx="0.8" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#e8a08a" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#e8a08a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#pool)"/>
  <!-- clock ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#fffdf8" stroke-width="18" stroke-opacity="0.85"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#1f1b16" stroke-width="18"
          stroke-opacity="0.9" stroke-linecap="round"
          stroke-dasharray="660 942" transform="rotate(-90 256 256)"/>
  <!-- numeral 7 -->
  <text x="256" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="230"
        font-weight="700" fill="#1f1b16" text-anchor="middle">7</text>
</svg>
