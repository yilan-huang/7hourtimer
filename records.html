<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seven Hours Records</title>
<style>
:root{
  --bg:#f4efe6;--bg2:#efe7d8;--bg3:#e9dfcc;--ink:#1f1b16;--ink-soft:#8a7d6c;--paper:#fffdf8;
  --accent:#c8722f;--done:#3c6e4f;--done-soft:#a9c7b3;--line:#d8cfbe;--shadow:rgba(40,30,20,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(160deg,var(--bg),var(--bg2) 55%,var(--bg3));
  background-attachment:fixed;color:var(--ink);
  font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;padding:40px 20px 80px;
}
.wrap{max-width:820px;margin:0 auto}
header{border-bottom:1px solid transparent;
  border-image:linear-gradient(90deg,transparent,rgba(31,27,22,.28),transparent) 1;
  padding-bottom:16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
h1{font-size:clamp(30px,5vw,48px);letter-spacing:-.02em;line-height:.95}
.sub{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--ink-soft);margin-top:8px}
.back{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;letter-spacing:.06em;
  color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:8px 16px;border-radius:20px;
  white-space:nowrap;transition:background .15s,color .15s}
.back:hover{background:var(--accent);color:#fff}

/* summary strip */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:24px 0 30px}
.sumcard{background:var(--paper);border:1px solid rgba(31,27,22,.08);border-radius:12px;
  padding:14px 16px;box-shadow:0 4px 12px var(--shadow)}
.sumcard .l{font-family:"Helvetica Neue",Arial,sans-serif;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.sumcard .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:5px}
.sumcard .v .unit{font-size:13px;font-weight:400;color:var(--ink-soft);margin-left:3px}

.controls{display:flex;justify-content:flex-end;gap:10px;margin-bottom:16px}
.controls button{font-family:"Helvetica Neue",Arial,sans-serif;cursor:pointer;font-size:11px;
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:8px 14px;border-radius:8px;
  border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);transition:color .15s,border-color .15s}
.controls button:hover{color:var(--accent);border-color:var(--accent)}

/* per-day cards */
.day{background:var(--paper);border:1px solid rgba(31,27,22,.08);border-radius:14px;
  padding:20px 22px;margin-bottom:16px;box-shadow:0 5px 16px var(--shadow)}
.day-head{display:flex;justify-content:space-between;align-items:baseline;gap:14px;flex-wrap:wrap;
  margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.day-date{font-size:20px;font-weight:700;letter-spacing:-.01em}
.day-meta{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;color:var(--ink-soft);
  font-variant-numeric:tabular-nums;text-align:right;line-height:1.6}
.day-meta .pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-left:6px}
.pill.full{background:var(--done-soft);color:#234a34}
.pill.part{background:#eadfca;color:#8a6d36}

.cat-row{display:grid;grid-template-columns:130px 1fr 62px;gap:12px;align-items:center;
  font-family:"Helvetica Neue",Arial,sans-serif;padding:7px 0}
@media(max-width:520px){.cat-row{grid-template-columns:100px 1fr 54px;gap:8px}}
.cat-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-name.done::after{content:" ✓";color:var(--done)}
.cat-bar{height:10px;background:rgba(31,27,22,.07);border-radius:20px;overflow:hidden;display:flex;align-items:center;gap:2px}
.cat-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#e8b04a,var(--accent))}
.cat-fill.done{background:linear-gradient(90deg,var(--done-soft),var(--done))}
.cat-over{height:100%;border-radius:20px;background:repeating-linear-gradient(45deg,var(--done),var(--done) 3px,var(--done-soft) 3px,var(--done-soft) 6px);opacity:.85}
.cat-time{font-size:12px;font-variant-numeric:tabular-nums;color:var(--ink-soft);text-align:right;line-height:1.3}
.cat-time .over-tag{display:block;font-size:10px;color:var(--done);font-weight:600}
.day-total{font-family:"Helvetica Neue",Arial,sans-serif;font-size:12px;color:var(--ink-soft);
  margin-top:12px;text-align:right;font-variant-numeric:tabular-nums}
.day-total strong{color:var(--ink);font-size:14px}

.empty{font-family:"Helvetica Neue",Arial,sans-serif;color:var(--ink-soft);font-style:italic;
  text-align:center;padding:50px 20px;font-size:15px;line-height:1.7}
.empty a{color:var(--accent)}
.footer{font-family:"Helvetica Neue",Arial,sans-serif;text-align:center;font-size:11px;
  color:var(--ink-soft);margin-top:30px;letter-spacing:.04em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>The record</h1>
      <div class="sub">Detailed daily history</div>
    </div>
    <a class="back" href="index.html">&larr; Back to timers</a>
  </header>

  <div class="summary" id="summary"></div>
  <div class="controls">
    <button id="exportBtn">Export CSV</button>
    <button id="clearBtn">Clear history</button>
  </div>
  <div id="days"></div>
  <div class="empty" id="empty" style="display:none">
    No days logged yet.<br>Finish a day in the <a href="index.html">timer</a> and it will appear here.
  </div>
  <div class="footer">Stored on this device &middot; export regularly to keep a backup</div>
</div>

<script>
const HKEY="sevenHours.history.v2";
const DURATION=60*60;
function loadHist(){try{return JSON.parse(localStorage.getItem(HKEY))||[];}catch(e){return[];}}
function prettyDate(d){
  try{return new Date(d+'T00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
  catch(e){return d;}
}
function fmtDur(sec){
  const m=Math.round(sec/60);
  if(m<60)return m+"m";
  const h=Math.floor(m/60),mm=m%60;
  return mm?`${h}h ${mm}m`:`${h}h`;
}
// normalize both old (cats:[names]) and new (cats:[{name,spent,done}]) formats
function normalizeCats(d){
  if(!Array.isArray(d.cats))return [];
  if(d.cats.length && typeof d.cats[0]==='object'){
    return d.cats.map(c=>({name:c.name,spent:c.spent||0,done:!!c.done}));
  }
  // old format: names only, infer spent from done flag isn't possible → mark done ones as full hour
  return d.cats.map((name,i)=>({name,spent:(i<(d.done||0))?DURATION:0,done:i<(d.done||0)}));
}

const hist=loadHist();
const daysEl=document.getElementById('days');
const emptyEl=document.getElementById('empty');

if(!hist.length){
  emptyEl.style.display='block';
  document.getElementById('summary').style.display='none';
  document.querySelector('.controls').style.display='none';
}else{
  // ---- summary ----
  let totalDays=hist.length, totalSpent=0, totalOver=0, totalDone=0, fullDays=0;
  hist.forEach(d=>{
    const cats=normalizeCats(d);
    cats.forEach(c=>{totalSpent+=c.spent;totalOver+=Math.max(0,c.spent-DURATION);});
    totalDone += (d.done||cats.filter(c=>c.done).length);
    if((d.done||0) >= (d.total||7)) fullDays++;
  });
  const sum=[
    ['Days logged', totalDays, ''],
    ['Total time', Math.round(totalSpent/3600), 'h'],
    ['Extra effort', Math.round(totalOver/3600), 'h'],
    ['Full 7/7 days', fullDays, '']
  ];
  document.getElementById('summary').innerHTML=sum.map(([l,v,u])=>
    `<div class="sumcard"><div class="l">${l}</div><div class="v">${v}<span class="unit">${u}</span></div></div>`).join('');

  // ---- per-day cards ----
  daysEl.innerHTML=hist.map(d=>{
    const cats=normalizeCats(d);
    const total=d.total||cats.length||7;
    const done=d.done!=null?d.done:cats.filter(c=>c.done).length;
    const full=done>=total;
    const daySpent=cats.reduce((s,c)=>s+c.spent,0);
    const dayOver=cats.reduce((s,c)=>s+Math.max(0,c.spent-DURATION),0);
    const rows=cats.map(c=>{
      const pct=Math.min(100,(Math.min(c.spent,DURATION)/DURATION)*100);
      const over=Math.max(0,c.spent-DURATION);
      const overPct=Math.min(40,(over/DURATION)*100); // small visual nub for overtime
      return `<div class="cat-row">
        <div class="cat-name ${c.done?'done':''}">${c.name}</div>
        <div class="cat-bar">
          <div class="cat-fill ${c.done?'done':''}" style="width:${pct}%"></div>
          ${over>0?`<div class="cat-over" style="width:${overPct}%"></div>`:''}
        </div>
        <div class="cat-time">${fmtDur(c.spent)}${over>0?`<span class="over-tag">+${fmtDur(over)}</span>`:''}</div>
      </div>`;
    }).join('');
    const span=(d.firstStart&&d.allDone)?`${d.firstStart} → ${d.allDone}`:(d.firstStart||'—');
    return `<div class="day">
      <div class="day-head">
        <div class="day-date">${prettyDate(d.date)}</div>
        <div class="day-meta">${span}
          <span class="pill ${full?'full':'part'}">${done}/${total}</span></div>
      </div>
      ${rows}
      <div class="day-total">Total focused: <strong>${fmtDur(daySpent)}</strong>${dayOver>0?` &middot; extra effort <strong style="color:var(--done)">+${fmtDur(dayOver)}</strong>`:''}</div>
    </div>`;
  }).join('');
}

// ---- export CSV (detailed: one row per category per day) ----
document.getElementById('exportBtn')?.addEventListener('click',()=>{
  let csv="date,first_start,all_complete,category,minutes_spent,finished\n";
  hist.forEach(d=>{
    normalizeCats(d).forEach(c=>{
      const name='"'+String(c.name).replace(/"/g,'""')+'"';
      csv+=`${d.date},${d.firstStart||''},${d.allDone||''},${name},${Math.round(c.spent/60)},${c.done?'yes':'no'}\n`;
    });
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='seven-hours-detailed-records.csv';a.click();
});

// ---- clear all history (moved here from the timer page) ----
document.getElementById('clearBtn')?.addEventListener('click',()=>{
  if(confirm('Permanently delete all saved daily records? This cannot be undone.')){
    localStorage.setItem(HKEY,JSON.stringify([]));
    location.reload();
  }
});
</script>
</body>
</html>
